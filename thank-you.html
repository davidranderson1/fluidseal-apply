<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment — Fluidseal AB</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23231F20'/%3E%3Ccircle cx='16' cy='16' r='8' fill='%23FFDD00'/%3E%3C/svg%3E">
<meta name="theme-color" content="#231F20">
<meta name="robots" content="noindex">
<style>
  :root{--black:#231F20;--yellow:#FFDD00;--grey-light:#C6C8CA;--surface:#f5f6f8;--text:#231F20;--text-muted:#5b6066;--border:#dfe2e6;--ok:#2e9e5a;--important:#c8222a;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Helvetica Neue',Helvetica,Arial,'Segoe UI',sans-serif;color:var(--text);background:var(--surface);min-height:100vh;}
  .header{display:flex;align-items:center;gap:14px;padding:0 32px;height:60px;background:var(--black);}
  .logo{display:flex;align-items:center;background:#fff;padding:6px 11px;border-radius:5px;}
  .logo svg{height:26px;width:auto;display:block;}
  .wrap{max-width:560px;margin:0 auto;padding:56px 24px;}
  .card{background:#fff;border:1px solid var(--border);border-top:4px solid var(--yellow);border-radius:12px;padding:34px 34px 30px;text-align:center;}
  .icon{width:66px;height:66px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:34px;}
  .icon.ok{background:#eafaf0;color:var(--ok);}
  .icon.no{background:#fdecec;color:var(--important);}
  h1{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:800;font-size:26px;letter-spacing:-.4px;margin:0 0 8px;}
  .msg{color:var(--text-muted);font-size:15px;line-height:1.55;margin:0 0 22px;}
  .receipt{border:1px solid var(--border);border-radius:10px;text-align:left;overflow:hidden;margin:0 auto 8px;max-width:420px;}
  .receipt .r{display:flex;justify-content:space-between;padding:11px 16px;border-bottom:1px solid #eef0f3;font-size:14px;}
  .receipt .r:last-child{border-bottom:none;}
  .receipt .r .k{color:var(--text-muted);text-transform:uppercase;font-size:11px;font-weight:700;letter-spacing:.04em;}
  .receipt .r .v{font-weight:700;}
  .foot{margin-top:22px;font-size:12.5px;color:var(--text-muted);}
  a{color:var(--black);font-weight:700;}
</style>
</head>

</div>

<div class="wrap">
  <div class="card" id="card">
    <div class="icon ok" id="icon">✓</div>
    <h1 id="title">Payment received</h1>
    <p class="msg" id="msg">Thank you — your payment has been processed. A receipt has been emailed to you.</p>
    <div class="receipt" id="receipt"></div>
    <div class="foot">Questions about your account? Email <a href="mailto:absecretary@sealsonline.com">absecretary@sealsonline.com</a>.</div>
  </div>
</div>

<script>
  const q=new URLSearchParams(location.search);
  const approved = q.get('trnApproved')==='1';
  const amount = q.get('trnAmount');
  const order = q.get('trnOrderNumber');
  const trnId = q.get('trnId');
  const message = q.get('messageText');
  const icon=document.getElementById('icon'), title=document.getElementById('title'), msg=document.getElementById('msg');
  if(!approved){
    icon.className='icon no'; icon.textContent='!';
    title.textContent='Payment not completed';
    msg.textContent = (message? decodeURIComponent(message.replace(/\+/g,' '))+'. ' : '') + 'Your card was not charged. Please try the payment link again, or contact us and we\'ll help.';
  }
  const rows=[];
  if(amount) rows.push(['Amount','$'+amount+' CAD']);
  if(order) rows.push(['Invoice / Order', decodeURIComponent(order.replace(/\+/g,' '))]);
  if(approved && trnId) rows.push(['Confirmation #', trnId]);
  const r=document.getElementById('receipt');
  if(rows.length){ r.innerHTML=rows.map(([k,v])=>`<div class="r"><span class="k">${k}</span><span class="v">${v}</span></div>`).join(''); }
  else { r.style.display='none'; }
</script>
</body>
</html>
